<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calorie Calculator</title>
    <link rel="stylesheet" href="style.css" >
</head>

<body>

    <div class="page-wrapper">

        <div id="screen-1">

            <div class="calculator-container">

                <header class="calculator-header">
                    <p class="app-title">CALORIE CALCULATOR</p>
                </header>

                <section class="form-card">

                    <h2 class="form-title">Your Details</h2>

                    <div class="form-row">
                        <label for="age">Age</label>
                        <input type="number" id="age" placeholder="Enter your age" />
                    </div>

                    <div class="form-row">
                        <label>Gender</label>
                        <div class="gender-group">
                            <button type="button" class="gender-btn active">Male</button>
                            <button type="button" class="gender-btn">Female</button>
                        </div>
                    </div>

                    <div class="form-row">
                        <label for="height">Height (cm)</label>
                        <input type="number" id="height" placeholder="Enter height in cm" />
                    </div>

                    <div class="form-row">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" placeholder="Enter weight in kg" />
                    </div>

                    <div class="form-row">
                        <label for="activity">Activity Level</label>
                        <select id="activity">
                            <option value="">Select activity level</option>
                            <option value="sedentary">Sedentary</option>
                            <option value="light">Light (1-3 days/week)</option>
                            <option value="moderate">Moderate (3-5 days/week)</option>
                            <option value="active">Active (6-7 days/week)</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <button type="button" class="primary-btn" id="calculate-btn">
                            Calculate →
                        </button>
                    </div>

                </section>

                <footer class="calculator-footer">
                    <button type="button" class="reset-btn">Reset</button>
                </footer>

            </div>
        </div>


        <div id="screen-2" style="display: none;" >
            <div class="calculator-container">
                 <header class="calculator-header">
                    <p class="app-title">CALORIE CALCULATOR</p>
                </header>

                <section class="form-card">
                    <div class="result-icon">🧮</div>

                    <p class="result-title">DAILY MAINTENANCE CALORIES</p>

                     <h1 class="calories">
                        <span id="maintenance-calories">0</span>
                        <small>kcal / day</small>
                    </h1>

                     <p class="result-text">
                        This is the estimated number of calories you need to
                        <strong>maintain your current weight</strong>.
                    </p>

                    <div class="calorie-breakdown">
                        <div class="breakdown-row">
                            <span>BMR (Base)</span>
                            <span>~ <span id="bmr-value">0</span></span>
                        </div>
                        <div class="breakdown-row">
                            <span>Activity Bonus</span>
                            <span>+<span id="activity-value" >0</span></span>
                        </div>
                    </div>

                    <button class="primary-btn">
                        Set a Goal ->
                    </button>
                </section>

                <footer class="calculator-footer">
                    <button type="button" class="back-btn">Back</button>
                    <button class="reset-btn">Reset</button>
                </footer>

            </div>
        </div>
    </div>




<script>
    const ageInput = document.getElementById("age");
    const heightInput = document.getElementById("height");
    const weightInput = document.getElementById("weight");
    const activitySelect = document.getElementById("activity");

    const genderButtons = document.querySelectorAll(".gender-btn");
    const calculateBtn = document.getElementById("calculate-btn");

    const screen1 = document.getElementById("screen-1");
    const screen2 = document.getElementById("screen-2");

    const caloriesvalue = document.getElementById("maintenance-calories");
    const bmrValue = document.getElementById("bmr-value");
    const activityValue = document.getElementById("activity-value");

    const backBtn = document.querySelector(".back-btn");
    const resetBtns = document.querySelectorAll(".reset-btn");

    let selectedGender = "male";

    genderButtons.forEach(btn =>{
        btn.addEventListener("click", ()=>{
            genderButtons.forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            selectedGender = btn.textContent.toLowerCase();
        })
    })

    const activityMultipliers = {
        sedentary: 1.2,
        light: 1.375,
        moderate: 1.55,
        active: 1.725
    };

    calculateBtn.addEventListener("click", ()=>{
        const age = Number(ageInput.value);
        const height  = Number(heightInput.value);
        const weight = Number(weightInput.value);
        const activity = activitySelect.value;


        if(!age || !height || !weight || !activity){
            alert("please fill all the fields");
            return;
        }

         let bmr;
        if (selectedGender === "male") {
            bmr = 10 * weight + 6.25 * height - 5 * age + 5;
        } else {
            bmr = 10 * weight + 6.25 * height - 5 * age - 161;
        }

        const maintenanceCalories = Math.round(bmr *activityMultipliers[activity]);

        caloriesvalue.textContent = maintenanceCalories;

        bmrValue.textContent = Math.round(bmr);

        activityValue.textContent = maintenanceCalories - Math.round(bmr);

        screen1.style.display = "none";
        screen2.style.display = "block";


    });

    backBtn.addEventListener("click", () => {
        screen2.style.display = "none";
        screen1.style.display = "block";
    });

    resetBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            location.reload();
    });
});

</script>

</body>
</html>
